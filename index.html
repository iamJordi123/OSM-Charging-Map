<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>OSM EV Charging Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        /* Make the map fill the entire mobile screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #map {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Style for the GPS locate button */
        .locate-btn {
            background: white;
            padding: 10px;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        /* Tiny version tag overlaying the map corner */
        #version-tag {
            position: absolute;
            bottom: 20px;
            left: 10px;
            z-index: 1000; /* Forces it to sit on top of map tiles */
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none; /* Allows clicks to pass through to the map */
        }
    </style>
</head>
