<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OSM EV Charging Map</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #cbd5e1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
        }

        /* Enforce exact font sizing and positioning for our custom target symbol inside the native bar */
        .leaflet-bar a.leaflet-control-locate {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #version-tag {
            position: absolute;
            bottom: 20px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
</head>
<body>

    <div id="version-tag">v1.4</div>
    <div id="map"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            
            // 1. Setup Map Window (Centered on the Netherlands by default)
            const map = L.map('map', {
                center: [52.1326, 5.2913],
                zoom: 13,
                zoomControl: true
            });

            // 2. Load HTTPS OpenStreetMap Tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Layer to hold charging dots
            let markerLayer = L.layerGroup().addTo(map);
            let userLocationMarker = null;

            let debounceTimeout;

            // 3. Charging Station Data Engine
            async function fetchChargingStations() {
                if (!map.getBounds()) return;

                // Optimization: Don't fetch if user is zoomed out too far (stops API lag)
                if (map.getZoom() < 12) {
                    markerLayer.clearLayers();
                    return;
                }

                // Get current map coordinates directly from the screen view
                const bounds = map.getBounds();
                const south = bounds.getSouth();
                const west = bounds.getWest();
                const north = bounds.getNorth();
                const east = bounds.getEast();

                // Build a reliable Overpass API request string targeting the exact window area
                const query = `[out:json][timeout:25];(node["amenity"="charging_station"](${south},${west},${north},${east});way["amenity"="charging_station"](${south},${west},${north},${east}););out center;`;
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    markerLayer.clearLayers();

                    if (data && data.elements) {
                        data.elements.forEach(element => {
                            const lat = element.lat || (element.center && element.center.lat);
                            const lon = element.lon || (element.center && element.center.lon);
                            
                            if (lat && lon) {
                                const tags = element.tags || {};
                                const operator = tags.operator || tags.brand || "Unknown Operator";
                                const capacity = tags.capacity || "Not specified";
                                const kw = tags.kw || "";

                                // Determine color based on charging speed (kW)
                                let dotColor = "#3b82f6"; // Blue default
                                if (kw) {
                                    const power = parseFloat(kw);
                                    if (power >= 100) dotColor = "#ef4444";     // Red: Ultra Fast (DC)
                                    else if (power >= 22) dotColor = "#f97316"; // Orange: Fast (AC/DC)
                                    else dotColor = "#22c55e";                  // Green: Regular AC
                                }

                                const popupContent = `
                                    <div style="font-size: 14px; line-height: 1.4; font-family: sans-serif; min-width: 150px;">
                                        <strong>🏢 ${operator}</strong><br>
                                        ⚡ Power: ${kw ? kw + ' kW' : 'Not specified'}<br>
                                        🔌 Outlets: ${capacity}
                                    </div>
                                `;

                                // Circle Markers rendered via canvas code
                                const marker = L.circleMarker([lat, lon], {
                                    radius: 7,
                                    fillColor: dotColor,
                                    color: "#ffffff",
                                    weight: 1.5,
                                    opacity: 1,
                                    fillOpacity: 0.85
                                }).bindPopup(popupContent);

                                markerLayer.addLayer(marker);
                            }
                        });
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                }
            }

            // Fire fetch when user finishes dragging or zooming
            function onMapChange() {
                clearTimeout(debounceTimeout);
                debounceTimeout = setTimeout(fetchChargingStations, 300);
            }
            map.on('moveend', onMapChange);
            
            // 4. Handle Location Triggers (Only fires when button is clicked)
            map.on('locationfound', (e) => {
                if (userLocationMarker) {
                    map.removeLayer(userLocationMarker);
                }
                userLocationMarker = L.circle(e.latlng, { radius: e.accuracy / 2, color: '#0078ff', weight: 2, fillOpacity: 0.15 }).addTo(map);
            });

            map.on('locationerror', () => {
                alert("Location access denied or unavailable.");
            });

            // Make sure data runs smoothly the instant the view finishes mounting
            map.whenReady(() => {
                fetchChargingStations();
            });

            // 5. BULLETPROOF NATIVE EXTENSION: Appends button directly into the true + / - container block
            const zoomControlContainer = document.querySelector('.leaflet-control-zoom');
            if (zoomControlContainer) {
                const locateBtn = L.DomUtil.create('a', 'leaflet-control-locate', zoomControlContainer);
                locateBtn.innerHTML = "⌖";
                locateBtn.href = "#";
                locateBtn.title = "Find My Location";
                locateBtn.role = "button";
                
                locateBtn.onclick = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    map.locate({ setView: true, maxZoom: 15 });
                };
            }
        });
    </script>
</body>
</html>
