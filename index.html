<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OSM EV Charging Map</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background: #cbd5e1; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
        #version-tag { position: absolute; bottom: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.7); color: #0f0; padding: 2px 6px; font-size: 10px; font-family: monospace; border-radius: 3px; }
        
        .abrp-badge { display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .abrp-badge svg { width: 65%; height: 65%; fill: #fff; }
        .abrp-dot { border-radius: 50%; border: 2px solid #fff; box-shadow: 0 2px 3px rgba(0,0,0,0.3); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
</head>
<body>
    <div id="version-tag">v2.9</div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([52.1326, 5.2913], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const markerLayer = L.layerGroup().addTo(map);

        async function updateMap() {
            const bounds = map.getBounds();
            const query = `[out:json];node["amenity"="charging_station"](${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()});out center;`;
            const response = await fetch(`https://overpass.openstreetmap.fr/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            markerLayer.clearLayers();
            data.elements.forEach(el => {
                const tags = el.tags || {};
                const operator = (tags.operator || tags.brand || "").toLowerCase();
                const kw = parseFloat(tags.kw || tags.maxpower || 0);
                const color = kw >= 100 ? '#ef4444' : (kw >= 22 ? '#f97316' : '#22c55e');

                let icon;
                if (operator.includes("tesla")) {
                    icon = L.divIcon({
                        className: '',
                        html: `<div class="abrp-badge" style="width:30px; height:30px; background-color:#e82127;">
                                <svg viewBox="0 0 24 24"><path d="M12,21.3C12,21.3 12.3,10.6 12.3,9.5C12.3,8.4 14.2,7.3 15.3,7L15.3,6.2C13.4,6.4 12,7 12,7C12,7 10.6,6.4 8.7,6.2L8.7,7C9.8,7.3 11.7,8.4 11.7,9.5C11.7,10.6 12,21.3 12,21.3M4.6,5L4.8,4.2C7,3.3 9.4,2.9 12,2.9C14.6,2.9 17,3.3 19.2,4.2L19.4,5C17.1,4.2 14.6,3.8 12,3.8C9.4,3.8 6.9,4.2 4.6,5Z"/></svg>
                               </div>`,
                        iconSize: [30, 30], iconAnchor: [15, 15]
                    });
                } else {
                    icon = L.divIcon({
                        className: '',
                        html: `<div class="abrp-dot" style="width:14px; height:14px; background-color:${color};"></div>`,
                        iconSize: [14, 14], iconAnchor: [7, 7]
                    });
                }
                
                L.marker([el.lat || el.center.lat, el.lon || el.center.lon], { icon })
                 .bindPopup(`<b>${tags.operator || "Station"}</b><br>${kw} kW`)
                 .addTo(markerLayer);
            });
        }

        map.on('moveend', updateMap);
        updateMap();
    </script>
</body>
</html>
