<script>
        // 1. Initialize map without forcing a static view
        const map = L.map('map'); 

        // 2. Add OpenStreetMap background tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markerLayer = L.layerGroup().addTo(map);
        
        const NL_BOUNDS = {
            south: 50.75,
            west: 3.2,
            north: 53.7,
            east: 7.25
        };

        let debounceTimeout;

        // 3. Fetch data based entirely on where you are currently looking
        async function fetchChargingStations() {
            if (map.getZoom() < 12) {
                markerLayer.clearLayers();
                return;
            }

            const bounds = map.getBounds();
            
            const south = Math.max(bounds.getSouth(), NL_BOUNDS.south);
            const west = Math.max(bounds.getWest(), NL_BOUNDS.west);
            const north = Math.min(bounds.getNorth(), NL_BOUNDS.north);
            const east = Math.min(bounds.getEast(), NL_BOUNDS.east);

            if (south > north || west > east) {
                markerLayer.clearLayers();
                return;
            }

            const query = `
                [out:json][timeout:15];
                (
                  node["amenity"="charging_station"](${south},${west},${north},${east});
                  way["amenity"="charging_station"](${south},${west},${north},${east});
                );
                out body center;
            `;
            
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                markerLayer.clearLayers();

                data.elements.forEach(element => {
                    const lat = element.lat || (element.center && element.center.lat);
                    const lon = element.lon || (element.center && element.center.lon);
                    
                    if (lat && lon) {
                        const tags = element.tags || {};
                        const operator = tags.operator || "Unknown Operator";
                        const capacity = tags.capacity || "Unknown";
                        const kw = tags.kw || "";

                        let markerColor = "blue"; 
                        if (kw) {
                            const power = parseFloat(kw);
                            if (power >= 50) markerColor = "red";       
                            else if (power >= 22) markerColor = "orange"; 
                            else markerColor = "green";                  
                        }

                        const popupContent = `
                            <strong>${operator}</strong><br>
                            ⚡ Power: ${kw ? kw + ' kW' : 'Not specified'}<br>
                            🔌 Outlets: ${capacity}
                        `;

                        const marker = L.marker([lat, lon]).bindPopup(popupContent);
                        markerLayer.addLayer(marker);
                    }
                });
            } catch (error) {
                console.error("Error fetching charging stations:", error);
            }
        }

        // Trigger updates when you drag or zoom
        function onMapChange() {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(fetchChargingStations, 400);
        }
        map.on('moveend', onMapChange);
        
        // 4. Automatically locate user on startup
        map.locate({ setView: true, maxZoom: 14 });

        map.on('locationfound', (e) => {
            L.circle(e.latlng, e.accuracy / 2).addTo(map);
            // 'setView' from locate triggers 'moveend', which automatically runs fetchChargingStations()
        });

        map.on('locationerror', () => {
            // Fallback to center of NL if location permissions are denied
            map.setView([52.1326, 5.2913], 11);
            fetchChargingStations();
        });

        // 5. Floating Locate Button (for manual re-tracking)
        const LocateControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function() {
                const btn = L.DomUtil.create('button', 'locate-btn');
                btn.innerHTML = "📍 Find Me";
                btn.onclick = function() {
                    map.locate({ setView: true, maxZoom: 15 });
                };
                return btn;
            }
        });
        map.addControl(new LocateControl());
    </script>
