<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OSM EV Charging Map</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #cbd5e1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
        }
        
        /* Custom styled locate button matching Leaflet zoom controls precisely */
        .leaflet-touch .locate-btn, .locate-btn {
            background: #ffffff;
            width: 30px;
            height: 30px;
            line-height: 30px;
            border: none;
            border-bottom: 1px solid #ccc;
            border-radius: 0;
            cursor: pointer;
            font-size: 18px;
            color: #333;
            text-align: center;
            padding: 0;
            display: block;
            box-shadow: none;
        }
        
        /* Match standard Leaflet control container rounding rules */
        .leaflet-bar button:last-child {
            border-bottom: none;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
        }
        
        .locate-btn:hover {
            background: #f4f4f4;
            color: #000;
        }

        #version-tag {
            position: absolute;
            bottom: 20px;
            left: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
</head>
<body>

    <div id="version-tag">v1.2</div>
    <div id="map"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            
            // 1. Setup Map Window (Centered on the Netherlands by default)
            const map = L.map('map', {
                center: [52.1326, 5.2913],
                zoom: 13,
                zoomControl: true
            });

            // 2. Load HTTPS OpenStreetMap Tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Layer to hold charging dots
            let markerLayer = L.layerGroup().addTo(map);
            let userLocationMarker = null;
            
            // Boundaries for the Netherlands
            const NL_BOUNDS = {
                south: 50.75,
                west: 3.2,
                north: 53.7,
                east: 7.25
            };

            let debounceTimeout;

            // 3. Charging Station Data Engine
            async function fetchChargingStations() {
                if (!map.getBounds()) return;

                // Optimization: Don't fetch if user is zoomed out too far
                if (map.getZoom() < 12) {
                    markerLayer.clearLayers();
                    return;
                }

                const bounds = map.getBounds();
                const south = Math.max(bounds.getSouth(), NL_BOUNDS.south);
                const west = Math.max(bounds.getWest(), NL_BOUNDS.west);
                const north = Math.min(bounds.getNorth(), NL_BOUNDS.north);
                const east = Math.min(bounds.getEast(), NL_BOUNDS.east);

                if (south > north || west > east) {
                    markerLayer.clearLayers();
                    return;
                }

                const query = `[out:json][timeout:15];(node["amenity"="charging_station"](${south},${west},${north},${east});way["amenity"="charging_station"](${south},${west},${north},${east}););out center;`;
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    markerLayer.clearLayers();

                    if (data && data.elements) {
                        data.elements.forEach(element => {
                            const lat = element.lat || (element.center && element.center.lat);
                            const lon = element.lon || (element.center && element.center.lon);
                            
                            if (lat && lon) {
                                const tags = element.tags || {};
                                const operator = tags.operator || "Unknown Operator";
                                const capacity = tags.capacity || "Unknown";
                                const kw = tags.kw || "";

                                let dotColor = "#3b82f6"; // Blue default
                                if (kw) {
                                    const power = parseFloat(kw);
                                    if (power >= 100) dotColor = "#ef4444";     // Red: Ultra Fast (DC)
                                    else if (power >= 22) dotColor = "#f97316"; // Orange: Fast
                                    else dotColor = "#22c55e";                  // Green: Regular AC
                                }

                                const popupContent = `
                                    <div style="font-size: 14px; line-height: 1.4; font-family: sans-serif;">
                                        <strong>🏢 ${operator}</strong><br>
                                        ⚡ Power: ${kw ? kw + ' kW' : 'Not specified'}<br>
                                        🔌 Outlets: ${capacity}
                                    </div>
                                `;

                                const marker = L.circleMarker([lat, lon], {
                                    radius: 7,
                                    fillColor: dotColor,
                                    color: "#ffffff",
                                    weight: 1.5,
                                    opacity: 1,
                                    fillOpacity: 0.85
                                }).bindPopup(popupContent);

                                markerLayer.addLayer(marker);
                            }
                        });
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                }
            }

            function onMapChange() {
                clearTimeout(debounceTimeout);
                debounceTimeout = setTimeout(fetchChargingStations, 300);
            }
            map.on('moveend', onMapChange);
            
            // 4. Handle Location Triggers
            map.on('locationfound', (e) => {
                // Clear old accuracy circles if they exist
                if (userLocationMarker) {
                    map.removeLayer(userLocationMarker);
                }
                userLocationMarker = L.circle(e.latlng, { radius: e.accuracy / 2, color: '#0078ff', weight: 2, fillOpacity: 0.15 }).addTo(map);
            });

            map.on('locationerror', () => {
                alert("Location access denied or unavailable.");
            });

            // Initial baseline data pull right on center view loading completion
            map.whenReady(() => {
                fetchChargingStations();
            });

            // 5. Inject Custom Location Button directly into Leaflet's zoom control container box
            const CustomLocateControl = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function() {
                    // Find or create standard control container
                    const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                    const btn = L.DomUtil.create('button', 'locate-btn', container);
                    btn.innerHTML = "⌖"; // Standard location crosshair symbol
                    btn.title = "Find My Location";
                    
                    btn.onclick = function(e) {
                        e.stopPropagation();
                        map.locate({ setView: true, maxZoom: 15 });
                    };
                    return container;
                }
            });
            map.addControl(new CustomLocateControl());
        });
    </script>
</body>
</html>
